services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telegram
      POSTGRES_PASSWORD: telegram
      POSTGRES_DB: telegram_manager
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram -d telegram_manager"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      SESSION_FOLDER: /app/runtime/sessions
      SESSION_LOCK_DIR: /app/runtime/locks
      DATABASE_URL: postgresql+psycopg2://telegram:telegram@db:5432/telegram_manager
      DATABASE_ENABLED: "true"
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    volumes:
      - telegram-sessions:/app/runtime/sessions
      - telegram-locks:/app/runtime/locks
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
  telegram-sessions:
  telegram-locks: